<!DOCTYPE html>  
<html lang="zh-TW">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>YUIOP - Discord Bot</title>  
    <style>  
        * {  
            margin: 0;  
            padding: 0;  
            box-sizing: border-box;  
        }  
        body {  
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 50%, #0f0f2e 100%);  
            color: #e0e0e0;  
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;  
            min-height: 100vh;  
            overflow-x: hidden;  
        }  
        .container {  
            max-width: 1200px;  
            margin: 0 auto;  
            padding: 20px;  
        }  
        header {  
            text-align: center;  
            padding: 60px 20px;  
            animation: fadeInDown 1s ease-out;  
        }  
        h1 {  
            font-size: 4em;  
            background: linear-gradient(45deg, #a020f0, #7c3aed, #a020f0);  
            -webkit-background-clip: text;  
            -webkit-text-fill-color: transparent;  
            background-clip: text;  
            text-shadow: 0 0 30px rgba(160, 32, 240, 0.5);  
            margin-bottom: 10px;  
            font-weight: 900;  
            letter-spacing: 3px;  
        }  
        .subtitle {  
            font-size: 1.3em;  
            color: #a020f0;  
            text-shadow: 0 0 10px rgba(160, 32, 240, 0.3);  
            margin-bottom: 30px;  
        }  
        .features {  
            display: grid;  
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));  
            gap: 20px;  
            margin: 40px 0;  
            animation: fadeInUp 1s ease-out 0.2s both;  
        }  
        .feature-card {  
            background: rgba(160, 32, 240, 0.05);  
            border: 2px solid #a020f0;  
            border-radius: 10px;  
            padding: 20px;  
            text-align: center;  
            transition: all 0.3s ease;  
            box-shadow: 0 0 20px rgba(160, 32, 240, 0.1);  
        }  
        .feature-card:hover {  
            transform: translateY(-10px);  
            box-shadow: 0 0 40px rgba(160, 32, 240, 0.3);  
            background: rgba(160, 32, 240, 0.1);  
        }  
        .feature-card h3 {  
            color: #a020f0;  
            margin-bottom: 10px;  
            font-size: 1.3em;  
        }  
        .buttons {  
            display: flex;  
            gap: 20px;  
            justify-content: center;  
            margin: 40px 0;  
            flex-wrap: wrap;  
            animation: fadeInUp 1s ease-out 0.4s both;  
        }  
        .btn {  
            padding: 15px 40px;  
            font-size: 1.1em;  
            border: 2px solid #a020f0;  
            background: linear-gradient(45deg, #a020f0, #7c3aed);  
            color: white;  
            border-radius: 50px;  
            cursor: pointer;  
            transition: all 0.3s ease;  
            text-decoration: none;  
            display: inline-block;  
            font-weight: bold;  
            text-shadow: 0 0 10px rgba(160, 32, 240, 0.5);  
            box-shadow: 0 0 20px rgba(160, 32, 240, 0.3);  
        }  
        .btn:hover {  
            transform: scale(1.05);  
            box-shadow: 0 0 40px rgba(160, 32, 240, 0.6);  
            background: linear-gradient(45deg, #7c3aed, #a020f0);  
        }  
        .btn:active {  
            transform: scale(0.98);  
        }  
        .btn-discord {  
            background: linear-gradient(45deg, #5865F2, #4752C4);  
            border-color: #5865F2;  
            text-shadow: 0 0 10px rgba(88, 101, 242, 0.5);  
            box-shadow: 0 0 20px rgba(88, 101, 242, 0.3);  
        }  
        .btn-discord:hover {  
            box-shadow: 0 0 40px rgba(88, 101, 242, 0.6);  
            background: linear-gradient(45deg, #4752C4, #5865F2);  
        }  
        @keyframes fadeInDown {  
            from {  
                opacity: 0;  
                transform: translateY(-30px);  
            }  
            to {  
                opacity: 1;  
                transform: translateY(0);  
            }  
        }  
        @keyframes fadeInUp {  
            from {  
                opacity: 0;  
                transform: translateY(30px);  
            }  
            to {  
                opacity: 1;  
                transform: translateY(0);  
            }  
        }  
        @keyframes scroll {  
            0%, 100% {  
                transform: translateY(0);  
            }  
            50% {  
                transform: translateY(-20px);  
            }  
        }  
        .scroll-indicator {  
            text-align: center;  
            margin-top: 40px;  
            animation: scroll 2s infinite;  
            color: #a020f0;  
        }  
        footer {  
            text-align: center;  
            padding: 40px 20px;  
            color: #666;  
            border-top: 1px solid rgba(160, 32, 240, 0.2);  
            margin-top: 60px;  
        }  
        @media (max-width: 768px) {  
            h1 {  
                font-size: 2.5em;  
            }  
            .subtitle {  
                font-size: 1em;  
            }  
            .buttons {  
                flex-direction: column;  
            }  
            .btn {  
                width: 100%;  
            }  
        }  
    </style>  
</head>  
<body>  
    <div class="container">  
        <header>  
            <h1>YUIOP</h1>  
            <p class="subtitle">✨ dm轟炸機器人 ✨</p>  
        </header>  
        <div class="features">  
            <div class="feature-card">  
                <h3>⚡ 快速</h3>  
                <p>機器人發送</p>  
            </div>  
            <div class="feature-card">  
                <h3>🔒 安全</h3>  
                <p>不會把你的隱私洩露出去</p>  
            </div>  
            <div class="feature-card">  
                <h3>🎯 易用</h3>  
                <p>簡單直觀的命令</p>  
            </div>  
        </div>  
        <div class="buttons">  
            <a href="https://discord.com/api/oauth2/authorize?client_id=1472535608399495190&permissions=8&scope=bot%20applications.commands" class="btn">邀請機器人</a>  
            <a href="https://discord.gg/rvGCY3mjd" class="btn btn-discord">加入我們的伺服器</a>  
        </div>  
        <div class="scroll-indicator">  
            ↓ 向下滾動 ↓  
        </div>  
    </div>  
    <footer>  
        <p>&copy; 2024 YUIOP Discord Bot. All rights reserved.</p>  
    </footer>  
</body>  
</html>
