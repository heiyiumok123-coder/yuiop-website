<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BACON GUILD | 核心終端</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+TC:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --p: #bc13fe; /* 霓虹紫 */
            --bg: #050505;
            --card-bg: rgba(20, 20, 25, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
        }

        /* 粒子背景背景特效 */
        #canvas-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1a0b2e 0%, #050505 100%);
        }

        /* 頂部 Hero */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 1;
        }

        .hero h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 12vw, 7rem);
            letter-spacing: 20px;
            background: linear-gradient(to bottom, #fff, var(--p));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(188, 19, 254, 0.5));
            margin-bottom: 20px;
        }

        /* 中間加入按鈕優化 */
        .join-btn {
            padding: 20px 60px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            color: #fff;
            text-decoration: none;
            border: 1px solid var(--p);
            background: rgba(188, 19, 254, 0.05);
            backdrop-filter: blur(10px);
            transition: 0.5s;
            position: relative;
            overflow: hidden;
        }
        .join-btn:hover {
            background: var(--p);
            box-shadow: 0 0 50px var(--p);
            transform: translateY(-5px);
        }

        /* 介紹區域 */
        .section-title {
            text-align: center;
            font-family: 'Orbitron';
            font-size: 2.5rem;
            margin: 100px 0 50px;
            color: var(--p);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px 150px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        /* 玻璃擬態卡片 */
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(188, 19, 254, 0.2);
            padding: 40px;
            backdrop-filter: blur(15px);
            border-radius: 15px;
            transition: 0.4s;
            position: relative;
        }
        .card:hover {
            border-color: var(--p);
            transform: scale(1.02);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .card h3 { font-family: 'Orbitron'; color: var(--p); margin-bottom: 15px; }
        .card p { color: #aaa; line-height: 1.6; font-size: 0.95rem; }

        /* 隱藏入口提示 */
        .secret-trigger {
            margin-top: 20px;
            font-size: 0.7rem;
            color: #444;
            cursor: pointer;
            display: inline-block;
            transition: 0.3s;
        }
        .secret-trigger:hover { color: var(--p); }

        /* 三環動畫 */
        .admin-ring {
            position: fixed; bottom: 40px; right: 40px;
            width: 70px; height: 70px;
            display: none; cursor: pointer; z-index: 100;
        }
        .ring {
            position: absolute; width: 100%; height: 100%;
            border: 2px solid var(--p); border-radius: 50%;
            border-top-color: transparent; border-bottom-color: transparent;
            animation: rotate 3s linear infinite;
        }
        .ring-2 { transform: scale(0.7); animation-duration: 2s; animation-direction: reverse; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 管理員側邊欄 */
        .admin-panel {
            position: fixed; top: 0; right: -400px; width: 350px; height: 100vh;
            background: rgba(0, 0, 0, 0.95); border-left: 2px solid var(--p);
            padding: 50px 30px; transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 99;
        }
        .admin-panel.open { right: 0; }
        .input-group { margin-bottom: 20px; }
        input {
            width: 100%; padding: 12px; background: #111; border: 1px solid #333;
            color: #fff; border-radius: 5px; outline: none;
        }
        input:focus { border-color: var(--p); }
        .login-btn {
            width: 100%; padding: 15px; background: var(--p); border: none;
            color: #000; font-family: 'Orbitron'; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="canvas-bg"></div>

    <section class="hero">
        <h1>BACON</h1>
        <a href="https://discord.gg/rvGCY3mjd" class="join-btn">ENTER SERVER</a>
    </section>

    <h2 class="section-title">SYSTEM SPECS</h2>

    <div class="container">
        <div class="card">
            <h3>🤖 BACON BOT</h3>
            <p>全自動化 DM 系統。配備多重驗證機制，確保伺服器成員身分安全與訊息精準送達。</p>
            <span class="secret-trigger" onclick="showRing()">[ 權限加載 ]</span>
        </div>
        <div class="card">
            <h3>🛡️ FIREWALL</h3>
            <p>24/7 持續監控。攔截所有潛在的垃圾郵件與帳號威脅，維持社群的高品質交流環境。</p>
        </div>
        <div class="card">
            <h3>⚡ PERFORMANCE</h3>
            <p>採用 Zeabur 極速引擎。保證機器人 99.9% 在線率，指令響應時間低於 100ms。</p>
        </div>
    </div>

    <div id="adminRing" class="admin-ring" onclick="document.getElementById('adminPanel').classList.toggle('open')">
        <div class="ring"></div>
        <div class="ring ring-2"></div>
    </div>

    <div class="admin-panel" id="adminPanel">
        <div id="loginSection">
            <h3 style="font-family:'Orbitron'; color:var(--p); margin-bottom:30px;">ADMIN AUTH</h3>
            <div class="input-group"><input type="text" id="user" placeholder="ACCOUNT"></div>
            <div class="input-group"><input type="password" id="pass" placeholder="PASSWORD"></div>
            <button class="login-btn" onclick="checkAuth()">SIGN IN</button>
        </div>
        <div id="controlSection" style="display: none;">
            <h3 style="font-family:'Orbitron'; color:#ff4d4d; margin-bottom:30px;">TERMINAL</h3>
            <div class="input-group">
                <label style="font-size: 0.7rem; color: #666;">USER ID</label>
                <input type="text" placeholder="123456789...">
            </div>
            <button class="login-btn" style="background:#ff4d4d">BAN USER</button>
            <p style="margin-top: 20px; font-size: 0.8rem; color: #888; text-align: center;">手動模式：請生成指令後回 Discord 執行</p>
        </div>
    </div>

    <script>
        function showRing() {
            document.getElementById('adminRing').style.display = 'block';
        }

        function checkAuth() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "mok123" && p === "er398398") {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('controlSection').style.display = 'block';
            }
        }
    </script>
</body>
</html>
