<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>培根軍團 | 官方加入頻道</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+TC:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #bc13fe;
            --deep-purple: #3c096c;
            --dark-bg: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
            background-image: 
                linear-gradient(rgba(188, 19, 254, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(188, 19, 254, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* 頂部區域 */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle, rgba(60, 9, 108, 0.3) 0%, rgba(5, 5, 5, 1) 80%);
        }

        .hero h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            letter-spacing: 8px;
            color: #fff;
            text-shadow: 0 0 15px var(--neon-purple);
            margin-bottom: 20px;
        }

        /* 加入按鈕 */
        .join-btn {
            padding: 20px 50px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: #fff;
            text-decoration: none;
            border: 2px solid var(--neon-purple);
            background: rgba(188, 19, 254, 0.1);
            transition: 0.4s;
            box-shadow: 0 0 15px var(--neon-purple);
        }

        .join-btn:hover {
            background: var(--neon-purple);
            box-shadow: 0 0 50px var(--neon-purple);
            transform: translateY(-5px);
        }

        /* 內容區塊 */
        .section {
            padding: 100px 10%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        /* 滾動浮現方塊 */
        .feature-card {
            background: rgba(20, 20, 25, 0.9);
            border: 1px solid var(--deep-purple);
            padding: 40px;
            border-radius: 4px; /* 科技感方正邊角 */
            opacity: 0;
            transform: translateY(100px); /* 初始位置在下方 */
            transition: all 0.8s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .feature-card.active {
            opacity: 1;
            transform: translateY(0);
            border-left: 6px solid var(--neon-purple);
        }

        .feature-card h2 {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-purple);
            margin-bottom: 15px;
        }

        .feature-card p {
            color: #bbb;
            line-height: 1.6;
        }

        .footer {
            padding: 50px;
            text-align: center;
            color: #444;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>BACON GUILD</h1>
        <p style="color: #888; margin-bottom: 40px;">歡迎來到培根軍團，開啟你的科技新紀元</p>
        <a href="https://discord.gg/rvGCY3mjd" class="join-btn">JOIN SERVER</a>
    </section>

    <div class="section">
        <div class="feature-card">
            <h2>💎 專業社群</h2>
            <p>這裡匯聚了各路技術大佬，無論是機器人開發還是遊戲模組，都能找到同好。</p>
        </div>

        <div class="feature-card">
            <h2>🛡️ 嚴格驗證</h2>
            <p>採用獨家自動化驗證系統，確保群組環境純淨，拒絕廣告與騷擾訊息。</p>
        </div>

        <div class="feature-card">
            <h2>🚀 24/7 支援</h2>
            <p>我們的自研機器人全天候運作，隨時為成員提供所需的數據統計與功能支援。</p>
        </div>

        <div class="feature-card">
            <h2>🥓 專屬福利</h2>
            <p>加入我們，第一時間獲取培根軍團開發的各項工具使用權限與最新動態。</p>
        </div>
    </div>

    <footer class="footer">
        COPYRIGHT &copy; 2026 BACON GUILD. ALL RIGHTS RESERVED.
    </footer>

    <script>
        // 滾動浮現特效邏輯
        const scrollObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.feature-card').forEach(card => {
            scrollObserver.observe(card);
        });
    </script>
</body>
</html>
