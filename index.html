<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BACON GUILD | 終極控制端</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+TC:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --p: #bc13fe; 
            --p-glow: rgba(188, 19, 254, 0.6);
            --bg: #020202;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
            cursor: default;
        }

        /* 背景粒子流光 */
        #hero-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a052e 0%, #000 100%);
        }

        /* 頂級 Hero 標題區 */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        .hero h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 12vw;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 30px;
            background: linear-gradient(to bottom, #fff 30%, var(--p));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 50px var(--p-glow));
            animation: titlePulse 4s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 30px var(--p-glow)); }
            50% { transform: scale(1.02); filter: drop-shadow(0 0 70px var(--p)); }
        }

        /* 加入伺服器大按鈕 */
        .join-btn {
            margin-top: 40px;
            padding: 25px 80px;
            font-family: 'Orbitron';
            font-size: 1.8rem;
            color: #fff;
            text-decoration: none;
            border: 2px solid var(--p);
            background: rgba(188, 19, 254, 0.1);
            backdrop-filter: blur(10px);
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: 0.5s ease;
            box-shadow: 0 0 30px var(--p-glow);
        }
        .join-btn:hover {
            background: var(--p);
            box-shadow: 0 0 80px var(--p);
            transform: translateY(-10px) scale(1.05);
            color: #000;
        }

        /* 介紹容器 */
        .content-wrap {
            max-width: 1400px;
            margin: 0 auto;
            padding: 150px 40px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 50px;
        }

        /* 3D 效果卡片 */
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(188, 19, 254, 0.2);
            padding: 60px;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            position: relative;
            transition: 0.3s ease;
            overflow: hidden;
        }
        .card::before {
            content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(188, 19, 254, 0.2), transparent);
            transition: 0.5s;
        }
        .card:hover::before { left: 100%; }
        .card:hover {
            border-color: var(--p);
            transform: translateY(-20px) rotateX(5deg);
            background: rgba(188, 19, 254, 0.05);
        }

        .card h3 { font-family: 'Orbitron'; font-size: 2.2rem; color: var(--p); margin-bottom: 25px; }
        .card p { font-size: 1.1rem; color: #ccc; line-height: 2; }

        /* 特效解鎖按鈕 */
        .unlock-trigger {
            margin-top: 30px;
            cursor: pointer;
            font-family: 'Orbitron';
            color: #555;
            letter-spacing: 3px;
            transition: 0.3s;
        }
        .unlock-trigger:hover { color: var(--p); text-shadow: 0 0 10px var(--p); }

        /* 🌀 旗艦版三環 */
        .admin-ring-wrap {
            position: fixed; bottom: 50px; right: 50px;
            width: 100px; height: 100px;
            display: none; cursor: pointer; z-index: 1000;
        }
        .ring {
            position: absolute; width: 100%; height: 100%;
            border: 3px solid var(--p); border-radius: 50%;
            border-right-color: transparent; border-left-color: transparent;
            animation: ringRot 4s linear infinite;
        }
        .ring-inner { transform: scale(0.6); animation-duration: 2s; animation-direction: reverse; border-top-color: transparent; }
        .ring-mid { transform: scale(0.8); animation-duration: 3s; opacity: 0.5; }

        @keyframes ringRot { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 管理終端面板 */
        .panel {
            position: fixed; top: 0; right: -500px; width: 450px; height: 100vh;
            background: rgba(5, 5, 8, 0.98); border-left: 3px solid var(--p);
            padding: 80px 40px; transition: 0.7s cubic-bezier(0.85, 0, 0.15, 1);
            z-index: 999; box-shadow: -20px 0 100px rgba(0,0,0,0.9);
        }
        .panel.open { right: 0; }

        .inp-group { margin-bottom: 30px; }
        .inp-group label { display: block; font-family: 'Orbitron'; font-size: 0.8rem; color: var(--p); margin-bottom: 10px; }
        input {
            width: 100%; padding: 15px; background: #000; border: 1px solid #333;
            color: #fff; font-size: 1rem; outline: none; border-radius: 5px;
        }
        input:focus { border-color: var(--p); box-shadow: 0 0 15px var(--p-glow); }

        .exec-btn {
            width: 100%; padding: 20px; background: var(--p); border: none;
            font-family: 'Orbitron'; font-size: 1.2rem; font-weight: bold; cursor: pointer;
            transition: 0.3s;
        }
        .exec-btn:hover { letter-spacing: 5px; box-shadow: 0 0 30px var(--p); }

    </style>
</head>
<body>

    <div id="hero-bg"></div>

    <section class="hero">
        <h1>BACON</h1>
        <a href="https://discord.gg/rvGCY3mjd" class="join-btn">JOIN THE GUILD</a>
    </section>

    <div class="content-wrap">
        <div class="grid">
            <div class="card">
                <h3>CORE BOT</h3>
                <p>搭載培根軍團自主開發的 DM 管理協議。支援毫秒級反應速度與多維度身分驗證，為您的社群建立最強防線。</p>
                <div class="unlock-trigger" onclick="unlockAdmin()">[ ACCESS COMMANDER ]</div>
            </div>
            <div class="card">
                <h3>SECURE OPS</h3>
                <p>全天候 24/7 自動巡邏，搭載智能 ID 過濾器與惡意行為偵測，讓騷擾與廣告無處遁形。</p>
            </div>
        </div>
    </div>

    <div id="adminRing" class="admin-ring-wrap" onclick="document.getElementById('panel').classList.toggle('open')">
        <div class="ring"></div>
        <div class="ring ring-mid"></div>
        <div class="ring ring-inner"></div>
    </div>

    <div class="panel" id="panel">
        <div id="authBox">
            <h2 style="font-family:'Orbitron'; font-size:2.5rem; margin-bottom:40px;">AUTHENTICATION</h2>
            <div class="inp-group">
                <label>ADMIN ACCOUNT</label>
                <input type="text" id="user" placeholder="Enter ID...">
            </div>
            <div class="inp-group">
                <label>ACCESS KEY</label>
                <input type="password" id="pass" placeholder="••••••••">
            </div>
            <button class="exec-btn" onclick="doLogin()">VERIFY IDENTITY</button>
        </div>

        <div id="cmdBox" style="display:none;">
            <h2 style="font-family:'Orbitron'; font-size:2.5rem; color:#ff4d4d; margin-bottom:40px;">COMMANDER</h2>
            <div class="inp-group">
                <label>TARGET SNOWFLAKE ID</label>
                <input type="text" id="targetId" placeholder="User ID to ban...">
            </div>
            <button class="exec-btn" style="background:#ff4d4d;" onclick="alert('指令已傳輸：/blacklist add id:'+document.getElementById('targetId').value)">EXECUTE BLACKLIST</button>
            <p style="margin-top:40px; color:#555; font-size:0.8rem; text-align:center;">此終端已與 Discord 機器人安全連結</p>
        </div>
    </div>

    <script>
        // 啟動三環
        function unlockAdmin() {
            document.getElementById('adminRing').style.display = 'block';
            // 簡單的視覺回饋
            document.querySelector('.unlock-trigger').innerText = "[ MODULE ACTIVATED ]";
            document.querySelector('.unlock-trigger').style.color = "#00ff00";
        }

        // 登入邏輯
        function doLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "mok123" && p === "er398398") {
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('cmdBox').style.display = 'block';
            } else {
                alert("ACCESS DENIED: INVALID KEY");
            }
        }
    </script>
</body>
</html>
