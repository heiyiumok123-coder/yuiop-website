<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>培根軍團 | 官方門戶</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+TC:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #bc13fe;
            --deep-purple: #3c096c;
            --dark-bg: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
            background-image: linear-gradient(rgba(188, 19, 254, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(188, 19, 254, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* 頂部 Hero */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle, rgba(60, 9, 108, 0.4) 0%, rgba(5, 5, 5, 1) 80%);
        }

        /* 介紹區域容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 50px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
        }

        /* 機器人介紹卡片 */
        .card {
            background: rgba(15, 15, 20, 0.95);
            border: 1px solid var(--deep-purple);
            padding: 40px;
            border-radius: 5px;
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.8s ease;
        }

        .card.active { opacity: 1; transform: translateY(0); }

        /* 「更多」按鈕樣式 */
        .more-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 20px;
            border: 1px solid var(--neon-purple);
            color: var(--neon-purple);
            font-family: 'Orbitron', sans-serif;
            text-decoration: none;
            font-size: 0.8rem;
            transition: 0.3s;
            cursor: pointer;
            background: transparent;
        }

        .more-btn:hover {
            background: var(--neon-purple);
            color: #fff;
            box-shadow: 0 0 15px var(--neon-purple);
        }

        /* 三環管理員開關 (預設隱藏) */
        .admin-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 80px;
            height: 80px;
            cursor: pointer;
            z-index: 9999;
            display: none; /* 點擊更多後才會顯示 */
            justify-content: center;
            align-items: center;
        }

        .ring { position: absolute; border: 2px solid var(--neon-purple); border-radius: 50%; animation: rotate 3s linear infinite; }
        .ring-1 { width: 40px; height: 40px; border-top-color: transparent; }
        .ring-2 { width: 60px; height: 60px; animation-duration: 2s; border-bottom-color: transparent; }
        .ring-3 { width: 80px; height: 80px; animation-duration: 4s; border-left-color: transparent; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 管理員面板 */
        .admin-panel {
            position: fixed; top: 0; right: -400px; width: 350px; height: 100vh;
            background: rgba(10, 10, 15, 0.98); border-left: 2px solid var(--neon-purple);
            z-index: 9998; padding: 40px 25px; transition: 0.5s ease;
            backdrop-filter: blur(10px);
        }
        .admin-panel.open { right: 0; }

        .admin-input { width: 100%; padding: 12px; background: #000; border: 1px solid var(--deep-purple); color: #fff; margin-bottom: 15px; font-family: 'Orbitron'; }
        .admin-btn { width: 100%; padding: 15px; background: transparent; border: 1px solid var(--neon-purple); color: var(--neon-purple); cursor: pointer; font-family: 'Orbitron'; }
        .admin-btn:hover { background: var(--neon-purple); color: #fff; }

        .hidden-mode { display: none; }
    </style>
</head>
<body>

    <section class="hero">
        <h1 style="font-family:'Orbitron'; font-size: 4rem; text-shadow: 0 0 20px var(--neon-purple);">BACON GUILD</h1>
        <a href="https://discord.gg/rvGCY3mjd" class="more-btn" style="font-size: 1.5rem; padding: 15px 40px;">加入伺服器</a>
    </section>

    <div class="container">
        <div class="card active" id="botCard">
            <h3 style="font-family:'Orbitron'; color:var(--neon-purple); margin-bottom:15px;">🤖 BACON DM BOT</h3>
            <p>最強大的私訊管理系統，支援高效群發與安全防護。</p>
            <button class="more-btn" onclick="showAdminRing()">MORE</button>
        </div>
    </div>

    <div class="admin-toggle" id="adminRing" onclick="togglePanel()">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
    </div>

    <div class="admin-panel" id="adminPanel">
        <div id="loginArea">
            <h2 style="font-family:'Orbitron'; color:var(--neon-purple); text-align:center; margin-bottom:30px;">ADMIN LOGIN</h2>
            <input type="text" id="user" class="admin-input" placeholder="ACCOUNT">
            <input type="password" id="pass" class="admin-input" placeholder="PASSWORD">
            <button class="admin-btn" onclick="doLogin()">VERIFY</button>
        </div>

        <div id="controlArea" class="hidden-mode">
            <h2 style="font-family:'Orbitron'; color:#ff4d4d; text-align:center;">CONTROL</h2>
            <p style="text-align:center; font-size:0.8rem; color:#555; margin-bottom:30px;">Status: Online</p>
            <input type="text" id="target" class="admin-input" placeholder="USER SNOWFLAKE ID">
            <button class="admin-btn" style="border-color:#ff4d4d; color:#ff4d4d;" onclick="alert('已加入黑名單')">BLACKLIST ID</button>
            <button class="admin-btn" style="margin-top:10px; border:none; font-size:0.7rem;" onclick="location.reload()">LOGOUT</button>
        </div>
    </div>

    <script>
        // 點擊「更多」後顯示三環
        function showAdminRing() {
            document.getElementById('adminRing').style.display = 'flex';
            alert("⚠️ 系統偵測：管理員權限入口已在右下角開啟。");
        }

        // 切換面板
        function togglePanel() {
            document.getElementById('adminPanel').classList.toggle('open');
        }

        // 登入驗證
        function doLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "mok123" && p === "er398398") {
                document.getElementById('loginArea').classList.add('hidden-mode');
                document.getElementById('controlArea').classList.remove('hidden-mode');
            } else {
                alert("❌ 帳號或密碼錯誤！");
            }
        }
    </script>
</body>
</html>
