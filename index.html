<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BACON GUILD | 科技終端</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+TC:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #bc13fe;
            --deep-purple: #3c096c;
            --dark-bg: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; } /* 隱藏預設滑鼠 */

        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at center, rgba(60, 9, 108, 0.15) 0%, transparent 80%),
                linear-gradient(rgba(188, 19, 254, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(188, 19, 254, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }

        /* 自定義滑鼠跟隨 */
        #cursor {
            width: 20px; height: 20px;
            background: var(--neon-purple);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            mix-blend-mode: screen;
            transition: transform 0.1s ease;
            box-shadow: 0 0 20px var(--neon-purple);
        }

        /* 數據統計區 (數字跳動) */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            padding: 50px 0;
            background: rgba(157, 78, 221, 0.05);
            border-top: 1px solid var(--deep-purple);
            border-bottom: 1px solid var(--deep-purple);
        }
        .stat-item h2 { font-family: 'Orbitron'; font-size: 2.5rem; color: var(--neon-purple); }
        .stat-item p { font-size: 0.8rem; color: #888; letter-spacing: 2px; text-align: center;}

        /* 機器人詳細介紹區 */
        .bot-section {
            display: flex;
            align-items: center;
            padding: 100px 10%;
            gap: 50px;
            flex-wrap: wrap;
        }

        .bot-visual {
            flex: 1;
            min-width: 300px;
            text-align: center;
            position: relative;
        }

        /* 機器人核心發光圓環 */
        .bot-core {
            width: 250px; height: 250px;
            border: 5px solid var(--neon-purple);
            border-radius: 50%;
            margin: 0 auto;
            box-shadow: 0 0 50px var(--neon-purple);
            display: flex;
            justify-content: center;
            align-items: center;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px var(--neon-purple); }
            50% { transform: scale(1.05); box-shadow: 0 0 60px var(--neon-purple); }
            100% { transform: scale(1); box-shadow: 0 0 20px var(--neon-purple); }
        }

        .bot-info {
            flex: 1.5;
            min-width: 350px;
            opacity: 0; transform: translateX(50px);
            transition: 1s;
        }
        .bot-info.show { opacity: 1; transform: translateX(0); }

        .more-btn {
            background: transparent;
            border: 1px solid var(--neon-purple);
            color: var(--neon-purple);
            padding: 10px 30px;
            font-family: 'Orbitron';
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }
        .more-btn:hover { background: var(--neon-purple); color: #fff; box-shadow: 0 0 20px var(--neon-purple); }

        /* 管理員三環開關 (預設隱藏) */
        .admin-toggle {
            position: fixed; bottom: 30px; right: 30px;
            width: 80px; height: 80px; z-index: 9999;
            display: none; justify-content: center; align-items: center;
        }
        .ring { position: absolute; border: 2px solid var(--neon-purple); border-radius: 50%; animation: rotate 3s linear infinite; }
        .ring-1 { width: 40px; height: 40px; border-top-color: transparent; }
        .ring-2 { width: 60px; height: 60px; animation-duration: 2s; border-bottom-color: transparent; }
        .ring-3 { width: 80px; height: 80px; animation-duration: 4s; border-left-color: transparent; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 側邊面板 */
        .admin-panel {
            position: fixed; top: 0; right: -400px; width: 350px; height: 100vh;
            background: rgba(10, 10, 15, 0.98); border-left: 2px solid var(--neon-purple);
            z-index: 9998; padding: 40px 25px; transition: 0.5s ease;
        }
        .admin-panel.open { right: 0; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <section style="height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <h1 style="font-family:'Orbitron'; font-size: 5rem; text-shadow: 0 0 30px var(--neon-purple);">BACON DM</h1>
        <p style="letter-spacing: 5px; color: #888;">THE ULTIMATE DISCORD TERMINAL</p>
    </section>

    <div class="stats-bar">
        <div class="stat-item">
            <h2 class="counter" data-target="1500">0</h2>
            <p>TOTAL MEMBERS</p>
        </div>
        <div class="stat-item">
            <h2 class="counter" data-target="98">0</h2>
            <p>SERVER UPTIME %</p>
        </div>
        <div class="stat-item">
            <h2 class="counter" data-target="45000">0</h2>
            <p>MESSAGES SENT</p>
        </div>
    </div>

    <section class="bot-section">
        <div class="bot-visual">
            <div class="bot-core">
                <span style="font-family:'Orbitron'; color:white; font-size: 2rem;">BAC</span>
            </div>
        </div>
        <div class="bot-info" id="revealInfo">
            <h2 style="font-family:'Orbitron'; color:var(--neon-purple); font-size: 2.5rem; margin-bottom: 20px;">SYSTEM FEATURES</h2>
            <p style="color: #bbb; line-height: 2; margin-bottom: 10px;">• 私密訊息群發系統 - 毫秒級觸達全體成員。</p>
            <p style="color: #bbb; line-height: 2; margin-bottom: 10px;">• 智能黑名單攔截 - 自動識別惡意用戶 ID。</p>
            <p style="color: #bbb; line-height: 2; margin-bottom: 10px;">• 客製化 Embed 介面 - 打造專屬品牌通知。</p>
            <button class="more-btn" onclick="unlockAdmin()">MORE DETAILS</button>
        </div>
    </section>

    <div class="admin-toggle" id="adminRing" onclick="document.getElementById('adminPanel').classList.toggle('open')">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
    </div>

    <div class="admin-panel" id="adminPanel">
        <div id="loginSec">
            <h3 style="font-family:'Orbitron'; color:var(--neon-purple); margin-bottom: 20px;">LOGIN</h3>
            <input type="text" id="u" placeholder="ACCOUNT" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff; border:1px solid var(--deep-purple);">
            <input type="password" id="p" placeholder="PASSWORD" style="width:100%; padding:10px; margin-bottom:20px; background:#000; color:#fff; border:1px solid var(--deep-purple);">
            <button class="more-btn" style="width:100%" onclick="login()">ENTER SYSTEM</button>
        </div>
        <div id="ctrlSec" class="hidden">
            <h3 style="font-family:'Orbitron'; color:#ff4d4d; margin-bottom: 20px;">BLACKLIST PANEL</h3>
            <input type="text" id="tid" placeholder="USER SNOWFLAKE ID" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff; border:1px solid #ff4d4d;">
            <button class="more-btn" style="width:100%; border-color:#ff4d4d; color:#ff4d4d;" onclick="alert('ID 已提交至機器人核心')">BAN USER</button>
        </div>
    </div>

    <script>
        // 1. 滑鼠跟隨特效
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // 2. 數字跳動特效
        const counters = document.querySelectorAll('.counter');
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if(entry.isIntersecting) {
                    const target = +entry.target.getAttribute('data-target');
                    const countIt = () => {
                        const current = +entry.target.innerText;
                        const inc = target / 100;
                        if(current < target) {
                            entry.target.innerText = Math.ceil(current + inc);
                            setTimeout(countIt, 20);
                        } else { entry.target.innerText = target; }
                    };
                    countIt();
                }
            });
        });
        counters.forEach(c => observer.observe(c));

        // 3. 滾動顯現介紹
        const revealObserver = new IntersectionObserver(entries => {
            if(entries[0].isIntersecting) document.getElementById('revealInfo').classList.add('show');
        });
        revealObserver.observe(document.querySelector('.bot-section'));

        // 4. 管理員解鎖邏輯
        function unlockAdmin() {
            document.getElementById('adminRing').style.display = 'flex';
            alert("🔒 ADMIN INTERFACE ENABLED. CHECK BOTTOM RIGHT.");
        }

        function login() {
            if(document.getElementById('u').value === "mok123" && document.getElementById('p').value === "er398398") {
                document.getElementById('loginSec').classList.add('hidden');
                document.getElementById('ctrlSec').classList.remove('hidden');
            } else { alert("ACCESS DENIED"); }
        }
    </script>
</body>
</html>
